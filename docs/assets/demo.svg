<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="460" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">stublm — an OpenAI-compatible server, scripted in one JSON file</text>

  <text x="24" y="64" fill="#7ee787">$ stublm serve --scenario support.stub.json --port 8437</text>
  <text x="24" y="88" fill="#c9d1d9">[stublm] serving "support-stub" v1.2.3 on <tspan fill="#79c0ff">http://127.0.0.1:8437</tspan> — <tspan fill="#3fb950">4 rule(s)</tspan>, 2 model(s) …</text>

  <text x="24" y="124" fill="#7ee787">$ stublm reply --scenario support.stub.json --message "this is flaky" --repeat 2</text>
  <text x="24" y="148" fill="#c9d1d9">{"status":<tspan fill="#ff7b72">429</tspan>,"error":{"message":"Rate limit reached (scripted; the retry will succeed)"…}}</text>
  <text x="24" y="168" fill="#c9d1d9"><tspan fill="#a5d6ff">The dataset organizes the remaining edge cases. Each component summarizes the …</tspan></text>

  <text x="24" y="204" fill="#7ee787">$ stublm reply --scenario support.stub.json --message "stream please" \</text>
  <text x="24" y="224" fill="#7ee787">    --model stub-mini --stream --show-timing --seed 42    <tspan fill="#8b949e"># the slow-net profile's plan</tspan></text>
  <text x="24" y="248" fill="#d29922">: +800ms</text>
  <text x="24" y="268" fill="#c9d1d9">data: {…"delta":{"role":"assistant","content":""}…}</text>
  <text x="24" y="288" fill="#d29922">: +53ms</text>
  <text x="24" y="308" fill="#c9d1d9">data: {…"delta":{"content":"<tspan fill="#a5d6ff">This</tspan>"}…}</text>
  <text x="24" y="328" fill="#d29922">: +50ms</text>
  <text x="24" y="348" fill="#c9d1d9">data: {…"delta":{"content":"<tspan fill="#a5d6ff"> repl</tspan>"}…}   <tspan fill="#8b949e">⋯ then</tspan>  data: [DONE]</text>

  <text x="24" y="384" fill="#c9d1d9">← POST /v1/chat/completions (refund)  → <tspan fill="#3fb950">200, rule "refund-policy", byte-identical every run</tspan></text>
  <text x="24" y="404" fill="#c9d1d9">← POST /v1/chat/completions (flaky)   → <tspan fill="#d29922">429 + Retry-After: 1, then recovers</tspan></text>
  <text x="24" y="424" fill="#c9d1d9">← seed 42, any client, any day        → <tspan fill="#3fb950">the exact same bytes</tspan></text>
  <text x="24" y="448" fill="#8b949e">scripted · seeded · realistic SSE timing · offline · zero dependencies</text>
</svg>
